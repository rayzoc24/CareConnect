<!-- Impact Card Component -->
<div id="impactCardContainer">
  <div class="impact-card">
    <div class="impact-card-header">
      <h2>🌍 Your Impact</h2>
      <span class="impact-card-subtitle">Community contribution metrics</span>
    </div>

    <div class="impact-card-loading">
      <div class="impact-skeleton"></div>
      <div class="impact-skeleton short"></div>
      <div class="impact-skeleton short"></div>
    </div>

    <div class="impact-card-content" style="display:none;">
      <!-- Metrics Grid -->
      <div class="impact-metrics-grid">
        <!-- Issues Created/Claimed -->
        <div class="impact-metric-item">
          <div class="metric-icon" style="background: #dbeafe;">
            <span>📋</span>
          </div>
          <div class="metric-info">
            <span class="metric-label">Issues</span>
            <span class="metric-value" id="totalIssuesValue">0</span>
            <span class="metric-sublabel" id="issuesLabel">Created</span>
          </div>
        </div>

        <!-- Issues Resolved -->
        <div class="impact-metric-item">
          <div class="metric-icon" style="background: #dcfce7;">
            <span>✅</span>
          </div>
          <div class="metric-info">
            <span class="metric-label">Resolved</span>
            <span class="metric-value" id="resolvedIssuesValue">0</span>
            <span class="metric-sublabel">Issues Complete</span>
          </div>
        </div>

        <!-- Votes or Engagement -->
        <div class="impact-metric-item">
          <div class="metric-icon" style="background: #fef3c7;">
            <span id="engagementIcon">👍</span>
          </div>
          <div class="metric-info">
            <span class="metric-label" id="engagementLabel">Votes</span>
            <span class="metric-value" id="engagementValue">0</span>
            <span class="metric-sublabel" id="engagementSub">Community Input</span>
          </div>
        </div>
      </div>

      <!-- Progress Bar Section -->
      <div class="impact-progress-section">
        <div class="progress-label">
          <span>Resolution Rate</span>
          <span class="progress-percentage" id="resolutionPercent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </div>

      <!-- Impact Score Banner -->
      <div class="impact-score-banner">
        <span class="impact-score-label">Impact Score</span>
        <span class="impact-score-value" id="impactScore">0</span>
        <span class="impact-score-unit">pts</span>
      </div>

      <!-- Achievement Badge -->
      <div class="achievement-section">
        <span class="achievement-label">Achievement Level</span>
        <div class="achievement-badge" id="achievementBadge">
          <span class="badge-icon">🌱</span>
          <span class="badge-text">Getting Started</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="impact-card-actions">
        <button class="btn-action btn-view-activity">📊 View Activity</button>
        <button class="btn-action btn-view-leaderboard">🏆 See Leaderboard</button>
      </div>
    </div>

    <!-- Error State -->
    <div class="impact-card-error" style="display:none;">
      <span class="error-icon">⚠️</span>
      <span class="error-message">Failed to load impact data</span>
      <button class="btn-retry">Retry</button>
    </div>
  </div>
</div>
