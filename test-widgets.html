<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Trending & Leaderboard Widgets</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="trending-issues-styles.css" />
  <style>
    body {
      padding: 2rem;
      background: #f5f5f5;
    }
    .test-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .test-section {
      margin: 2rem 0;
      padding: 1.5rem;
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      border-radius: 4px;
    }
    .status {
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .status.success {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #22c55e;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #dc2626;
    }
    .status.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #3b82f6;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>🧪 Trending Issues & Leaderboard Widget Test</h1>
    
    <div class="test-section">
      <h2>Status Check</h2>
      <div id="status-container"></div>
    </div>

    <div class="test-section">
      <h2>🔥 Trending Issues</h2>
      <div id="trending-issues-container"></div>
    </div>

    <div class="test-section">
      <h2>🏆 Leaderboard</h2>
      <div class="leaderboard-controls" style="margin-bottom: 1.5rem;">
        <div class="toggle-group">
          <button class="toggle-btn active" data-type="volunteers">👥 Volunteers</button>
          <button class="toggle-btn" data-type="ngos">🏢 NGOs</button>
        </div>
        <div class="range-group">
          <button class="range-btn active" data-range="weekly">📅 This Week</button>
          <button class="range-btn" data-range="monthly">📆 This Month</button>
        </div>
      </div>
      <div id="leaderboard-list" class="leaderboard-list"></div>
    </div>
  </div>

  <!-- Widget Scripts -->
  <script src="trending-issues.js"></script>
  <script src="leaderboard-home.js"></script>

  <!-- Status Script -->
  <script>
    const statusContainer = document.getElementById("status-container");
    
    function addStatus(message, type = 'info') {
      const statusDiv = document.createElement('div');
      statusDiv.className = `status ${type}`;
      statusDiv.textContent = message;
      statusContainer.appendChild(statusDiv);
    }

    // Initial status
    addStatus('✓ Test page loaded successfully', 'success');
    addStatus('✓ Checking for trending container...', 'info');
    
    const trendingContainer = document.getElementById("trending-issues-container");
    if (trendingContainer) {
      addStatus('✓ Trending issues container found', 'success');
    } else {
      addStatus('✗ Trending issues container NOT found', 'error');
    }

    const leaderboardList = document.getElementById("leaderboard-list");
    if (leaderboardList) {
      addStatus('✓ Leaderboard list container found', 'success');
    } else {
      addStatus('✗ Leaderboard list container NOT found', 'error');
    }

    // Wait a moment for widgets to initialize
    setTimeout(() => {
      if (trendingContainer?.innerHTML.length > 10) {
        addStatus('✓ Trending issues content loaded', 'success');
      } else {
        addStatus('✗ Trending issues content NOT loaded', 'error');
      }

      if (leaderboardList?.innerHTML.length > 10) {
        addStatus('✓ Leaderboard content loaded', 'success');
      } else {
        addStatus('✗ Leaderboard content NOT loaded', 'error');
      }

      // Test API connections
      Promise.all([
        fetch('/api/issues/trending?limit=5').then(r => r.json()),
        fetch('/api/leaderboard/volunteers?range=weekly').then(r => r.json())
      ]).then(([trendingData, leaderboardData]) => {
        addStatus('✓ API endpoints are responsive', 'success');
        addStatus(`✓ Found ${trendingData.trending?.length || 0} trending issues`, 'info');
        addStatus(`✓ Found ${leaderboardData.leaderboard?.length || 0} leaderboard entries`, 'info');
      }).catch(err => {
        addStatus('✗ API error: ' + err.message, 'error');
      });
    }, 2000);
  </script>
</body>
</html>
